name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege. packages:read lets Trivy pull its vuln DB from ghcr.io as an
# authenticated user, which dodges the anonymous pull rate limit.
permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Secrets are empty on fork PRs, which would produce the invalid image name
  # "/howdz-frontend:<sha>". Fall back to a throwaway local namespace so build +
  # scan still run; the push steps are skipped further down.
  IMAGE_OWNER: ${{ secrets.DOCKERHUB_USERNAME || 'local' }}
  HUSKY: 0

jobs:
  build-and-scan:
    runs-on: self-hosted
    timeout-minutes: 60

    env:
      # Promoted to job env so the `if:` conditions below can read them.
      # The `secrets` context is NOT available in `if:` expressions.
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SonarQube needs full history for blame/new-code analysis

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Node 20 went EOL 2026-04-30
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      # ---------------------------------------------------------------------
      # SCA - OWASP Dependency-Check
      #
      # Run the CLI image directly rather than Dependency-Check_Action, which is
      # a Docker action that runs as root and leaves root-owned files in the
      # workspace. On a self-hosted runner those break the *next* run's checkout
      # cleanup. `-u $(id -u)` keeps everything owned by the runner.
      #
      # Report-only: NVD is flaky and DC is noisy on npm trees. The report is
      # always uploaded. Trivy is the gate.
      # ---------------------------------------------------------------------
      - name: Cache Dependency-Check NVD database
        uses: actions/cache@v4
        with:
          path: ~/.odc-data
          key: odc-data-${{ github.run_id }}
          restore-keys: odc-data-

      - name: OWASP Dependency Check
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p reports "$HOME/.odc-data"
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$HOME/.odc-data:/usr/share/dependency-check/data" \
            -v "$PWD:/src:ro" \
            -v "$PWD/reports:/report" \
            owasp/dependency-check:12.2.2 \
              --project howdz-dashboard \
              --scan /src/package-lock.json \
              --scan /src/backend/package-lock.json \
              --format HTML --format JSON \
              --out /report \
              ${NVD_API_KEY:+--nvdApiKey "$NVD_API_KEY"}

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports
          if-no-files-found: warn

      # ---------------------------------------------------------------------
      # SAST - SonarQube. Skips itself until SONAR_* exist, so the pipeline is
      # green before Sonar is provisioned. v3 was a Docker action (root-owned
      # .scannerwork/); v5 self-reports a security vulnerability. v6 is node20.
      # ---------------------------------------------------------------------
      - name: SonarQube Scan
        if: env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != ''
        uses: sonarsource/sonarqube-scan-action@v6

      - name: SonarQube Quality Gate
        if: env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != ''
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5

      # ---------------------------------------------------------------------
      # Build. `npm run build:docker` here is a fast fail-before-Docker check;
      # the image rebuilds it internally (dist/ is in .dockerignore).
      # ---------------------------------------------------------------------
      - name: Build frontend (self-hosted mode)
        run: npm run build:docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_OWNER }}/howdz-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_OWNER }}/howdz-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # ---------------------------------------------------------------------
      # Image scanning - this is the gate. `ignore-unfixed` stops the build from
      # failing on CVEs with no upstream patch; anything fixable at CRITICAL or
      # HIGH halts the pipeline.
      #
      # SUPPLY CHAIN: trivy-action was compromised in March 2026 (all tags
      # 0.0.1-0.34.2 hijacked). Tags were re-cut with a `v` prefix afterwards, so
      # v0.36.0 is post-remediation. Pin to a commit SHA once you verify one.
      # ---------------------------------------------------------------------
      - name: Trivy scan - frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_OWNER }}/howdz-frontend:${{ github.sha }}
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy scan - backend image
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_OWNER }}/howdz-backend:${{ github.sha }}
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      # ---------------------------------------------------------------------
      # Publish. Pushes to main only, once Docker Hub creds exist. We push the
      # exact image Trivy scanned (docker tag + push) rather than re-running
      # build-push-action, which would rebuild and could publish a different
      # digest than the one that passed the gate.
      # ---------------------------------------------------------------------
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push scanned images
        if: github.event_name == 'push' && env.DOCKERHUB_USERNAME != ''
        run: |
          set -euo pipefail
          for repo in howdz-frontend howdz-backend; do
            src="${IMAGE_OWNER}/${repo}:${GITHUB_SHA}"
            docker push "$src"
            docker tag "$src" "${IMAGE_OWNER}/${repo}:latest"
            docker push "${IMAGE_OWNER}/${repo}:latest"
          done

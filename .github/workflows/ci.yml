name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/howdz-frontend
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/howdz-backend

jobs:
  build-and-scan:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SonarQube needs full history for blame/new-code analysis

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: howdz-dashboard
          path: '.'
          format: 'HTML'
          out: 'reports'
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build frontend (self-hosted mode)
        run: npm run build:docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          load: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Trivy scan - frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Trivy scan - backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'

      # Everything below only runs for pushes to main - PRs stop after the scans above.
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push frontend image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Push backend image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

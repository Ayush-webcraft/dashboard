# Install once on the RHEL server at /etc/nginx/conf.d/howdz.conf
# (see docs/CICD_SETUP.md). The upstream blocks below include a symlink
# that deploy/scripts/deploy.sh flips between blue and green on every
# release, then reloads nginx - that flip *is* the traffic switch.

upstream frontend_upstream {
    include /etc/nginx/howdz/active-frontend-upstream.conf;
}

upstream backend_upstream {
    include /etc/nginx/howdz/active-backend-upstream.conf;
}

server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://backend_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
